<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2e7d32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mora Calidad">
  <title>Mora Calidad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #121212; }
    #splash {
      position: fixed; inset: 0; background: #121212;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash img { width: 140px; height: 140px; border-radius: 28px; margin-bottom: 20px; }
    #splash p { color: #95D50A; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    #splash .spinner {
      width: 36px; height: 36px; border: 4px solid #2e7d32;
      border-top-color: #95D50A; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Aviso de sin conexion (oculto por defecto) */
    #offline {
      display: none; margin-top: 28px; text-align: center;
      font-family: Arial, sans-serif; padding: 0 30px;
    }
    #offline h2 { color: #ff9800; font-size: 18px; margin-bottom: 10px; }
    #offline p { color: #bbb; font-size: 14px; font-weight: 400; letter-spacing: 0; line-height: 1.5; }
    #offline button {
      margin-top: 18px; padding: 12px 30px; border: none; border-radius: 10px;
      background: #2e7d32; color: #fff; font-size: 15px; font-weight: 900;
      font-family: Arial, sans-serif; cursor: pointer;
    }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icon-192.png" alt="Mora Calidad">
    <p>MORA PACKAGING</p>
    <div class="spinner" id="spinner"></div>
    <div id="offline">
      <h2>Sin conexi&oacute;n</h2>
      <p>No hay internet o la red va muy lenta.<br>
      Tranquilo: si ten&iacute;as un registro a medias, est&aacute; guardado
      y se recuperar&aacute; al volver a entrar.</p>
      <button onclick="location.reload()">REINTENTAR</button>
    </div>
  </div>
  <iframe id="app" src="https://script.google.com/macros/s/AKfycbxWCMOuHpsQ8Ara5Miw81ouGUBqijw5cQ8BpE6HF84b3boXPhXb2BFk8oZ_dsYSGlAq/exec" allowfullscreen
    allow="camera; microphone; geolocation"
    onload="appCargada()">
  </iframe>
  <script>
    var cargada = false;
    var TIMEOUT_CARGA_MS = 15000; // si en 15 s no ha cargado, avisamos

    function appCargada() {
      // En algunos navegadores onload salta aunque el iframe muestre un
      // error de red; si no hay conexion, seguimos ensenando el aviso.
      if (!navigator.onLine) { mostrarSinConexion(); return; }
      cargada = true;
      var s = document.getElementById('splash');
      s.style.opacity = '0';
      setTimeout(function(){ s.style.display = 'none'; }, 500);
    }

    function mostrarSinConexion() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('offline').style.display = 'block';
    }

    // Sin conexion al abrir: aviso inmediato, sin esperar al timeout
    if (!navigator.onLine) mostrarSinConexion();

    // Si a los 15 s el iframe sigue sin cargar (red caida o lentisima), avisamos
    setTimeout(function(){ if (!cargada) mostrarSinConexion(); }, TIMEOUT_CARGA_MS);

    // Si vuelve la conexion mientras esta el aviso, recargamos solos
    window.addEventListener('online', function(){
      if (!cargada) location.reload();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
